<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="view-transition" content="same-origin">
    <title>资源库 - 个性化学习助手</title>
    <script src="https://unpkg.com/lucide@0.460.0"></script>
    <link rel="stylesheet" href="./assets/styles-v4.css">
    <link rel="stylesheet" href="./assets/assistant.css">
    <script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github.min.css">
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <style>
        /* Old → v4 variable bridge */
        :root {
            --color-card: #fff;
            --color-border: var(--divider, #E8E0D4);
            --color-text: var(--text-1, #2D2318);
            --color-primary: var(--accent, #C77B3C);
            --color-bg: var(--bg-page, #FAF8F5);
        }

        /* ===== Tabs ===== */

        /* ===== Import Section ===== */
        .import-section {
            background: var(--color-card);
            border: 1px solid var(--color-border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
        }
        .import-title {
            font-size: 15px; font-weight: 600; color: var(--color-text);
            margin-bottom: 16px; cursor: pointer;
            display: flex; align-items: center; justify-content: space-between;
        }
        .import-area {
            border: 2px dashed var(--color-border);
            border-radius: 12px;
            padding: 32px;
            text-align: center;
            transition: all 0.2s;
            cursor: pointer;
        }
        .import-area:hover { border-color: #C77B3C; background: #F2EBDF; }
        .import-icon { width: 32px; height: 32px; margin-bottom: 8px; display: inline-flex; align-items: center; justify-content: center; }
        .import-text { font-size: 14px; color: #6B7280; }
        .import-form { display: none; margin-top: 16px; }
        .form-row { display: flex; gap: 12px; margin-bottom: 12px; }
        .form-input {
            flex: 1; padding: 10px 14px;
            border: 1px solid var(--color-border);
            border-radius: 8px; font-size: 14px; outline: none;
        }
        .form-input:focus { border-color: #C77B3C; }

        /* ===== Stats Strip ===== */
        #stats-bar .stat-item {
            cursor: pointer; transition: all 0.15s;
            padding: 8px 16px; border-radius: var(--r-md);
        }
        #stats-bar .stat-item:hover { background: var(--bg-hover); }
        #stats-bar .stat-item.active { background: var(--accent-soft); }

        /* ===== Filter Bar ===== */
        .filter-bar {
            display: flex; gap: 10px; margin-bottom: 24px;
            align-items: center; flex-wrap: wrap;
        }
        .filter-bar .btn-group {
            display: flex; gap: 0;
        }
        .filter-bar .btn-group .btn-ghost:first-child {
            border-radius: 8px 0 0 8px;
        }
        .filter-bar .btn-group .btn-ghost:last-child {
            border-radius: 0 8px 8px 0; border-left: none;
        }
        .filter-select {
            padding: 8px 14px;
            border: 1px solid #E5E7EB;
            border-radius: 8px;
            font-size: 14px;
            background: #fff;
            cursor: pointer; outline: none;
            min-width: 120px;
        }
        .filter-select:focus { border-color: var(--color-primary, #C77B3C); }
        .filter-input-wrapper {
            position: relative; flex: 1; max-width: 240px;
        }
        .filter-input-wrapper .search-icon {
            position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
            width: 16px; height: 16px; color: var(--text-3, #9A8A76); pointer-events: none;
        }
        .filter-input-wrapper .filter-input {
            padding: 8px 30px 8px 32px;
            border: 1px solid #E5E7EB;
            border-radius: 8px; font-size: 14px; outline: none;
            width: 100%;
        }
        .filter-input-wrapper .filter-input:focus { border-color: var(--color-primary, #C77B3C); }
        .filter-input-clear {
            position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
            width: 20px; height: 20px; cursor: pointer;
            display: none; align-items: center; justify-content: center;
            border-radius: 50%; border: none; background: #E5E7EB;
            color: #6B7280; font-size: 12px;
        }
        .filter-input-clear.visible { display: flex; }
        .btn-ghost {
            padding: 8px 14px;
            font-size: 13px; color: var(--text-2, #6B5C4A);
            background: transparent;
            border: 1px solid #E5E7EB;
            border-radius: 8px; cursor: pointer;
            transition: all 0.15s;
        }
        .btn-ghost:hover { border-color: var(--color-primary, #C77B3C); color: var(--color-primary, #C77B3C); }
        .btn-ghost.active { background: var(--color-primary, #C77B3C); color: #fff; border-color: var(--color-primary, #C77B3C); }

        /* ===== Resource Grid (卡片网格) ===== */
        .resource-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }
        @media (max-width: 1279px) { .resource-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 959px)  { .resource-grid { grid-template-columns: 1fr; } }

        .resource-card {
            background: var(--glass, rgba(255,255,255,0.50));
            backdrop-filter: blur(20px) saturate(150%);
            border: 1px solid var(--border-glass, rgba(255,255,255,0.30));
            border-radius: var(--r-lg, 16px);
            box-shadow: var(--shadow-glass, 0 4px 20px rgba(120,84,44,0.06));
            overflow: hidden;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            cursor: pointer;
            position: relative;
        }
        .resource-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 14px 40px rgba(120,84,44,0.14);
        }
        .resource-card-accent { height: 4px; }
        .resource-card-body { padding: 18px 20px 20px; }
        .resource-card-type {
            display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
        }
        .resource-card-type-icon {
            width: 36px; height: 36px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 16px;
        }
        .resource-card-type-label { font-size: 12px; color: var(--text-3, #9A8A76); font-weight: 500; }
        .resource-card-title {
            font-size: 15px; font-weight: 600; color: var(--text-1, #33291E);
            margin-bottom: 8px;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .resource-card-meta { font-size: 12px; color: var(--text-3, #9A8A76); margin-bottom: 2px; }
        .resource-card-kp {
            font-size: 12px; color: var(--color-primary, #C77B3C);
            cursor: pointer; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .resource-card-kp:hover { text-decoration: underline; }
        .resource-card-actions {
            display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap;
        }
        .resource-card .btn-card {
            padding: 5px 10px; font-size: 12px;
            border-radius: 5px; cursor: pointer; border: 1px solid #E5E7EB;
            background: #fff; color: var(--text-2, #6B5C4A);
            transition: all 0.15s;
        }
        .resource-card .btn-card:hover { border-color: var(--color-primary, #C77B3C); color: var(--color-primary, #C77B3C); }
        .resource-card .btn-card.danger:hover { border-color: #EF4444; color: #EF4444; background: rgba(239,68,68,0.06); }

        /* 批量选择 */
        .resource-card .card-checkbox {
            position: absolute; top: 10px; left: 10px;
            width: 20px; height: 20px; z-index: 2;
            display: none; cursor: pointer;
            accent-color: var(--color-primary, #C77B3C);
        }
        .batch-mode .resource-card .card-checkbox { display: block; }
        .resource-card.selected {
            border-color: var(--color-primary, #C77B3C);
            box-shadow: 0 0 0 2px rgba(199,123,60,0.25), var(--shadow-glass);
        }
        .batch-bar {
            display: none; position: sticky; bottom: 16px;
            background: #fff; border: 1px solid var(--color-primary, #C77B3C);
            border-radius: var(--r-lg, 16px); padding: 12px 20px;
            box-shadow: 0 8px 30px rgba(120,84,44,0.14);
            align-items: center; gap: 16px; z-index: 50;
            margin-top: -8px; margin-bottom: 16px;
        }
        .batch-mode .batch-bar { display: flex; }
        .batch-count { font-size: 14px; font-weight: 600; color: var(--text-1, #33291E); }

        /* ===== 列表视图 ===== */
        .resource-list { display: flex; flex-direction: column; gap: 8px; }
        .resource-list-row {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 16px;
            background: var(--glass, rgba(255,255,255,0.50));
            border: 1px solid var(--border-glass, rgba(255,255,255,0.30));
            border-radius: var(--r-md, 10px);
            transition: all 0.15s;
            min-height: 48px;
            position: relative;
        }
        .resource-list-row:hover { border-color: var(--color-primary, #C77B3C); box-shadow: 0 2px 8px rgba(120,84,44,0.06); }
        .resource-list-accent { width: 4px; height: 32px; border-radius: 2px; flex-shrink: 0; }
        .resource-list-icon { width: 32px; height: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .resource-list-icon i { width: 16px; height: 16px; color: #fff; }
        .resource-list-body { flex: 1; min-width: 0; }
        .resource-list-title { font-size: 14px; font-weight: 500; color: var(--text-1, #33291E); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .resource-list-meta { font-size: 12px; color: var(--text-3, #9A8A76); }
        .resource-list-actions { display: flex; gap: 8px; flex-shrink: 0; }
        .resource-list-actions .btn-list {
            padding: 4px 10px; font-size: 12px;
            border-radius: 4px; cursor: pointer; border: none;
            background: transparent; color: var(--text-2, #6B5C4A);
            transition: all 0.15s;
            white-space: nowrap;
        }
        .resource-list-actions .btn-list:hover { background: rgba(199,123,60,0.08); color: var(--color-primary, #C77B3C); }
        .resource-list-actions .btn-list.danger:hover { background: rgba(239,68,68,0.08); color: #EF4444; }
        .resource-list-row .list-checkbox {
            display: none; width: 18px; height: 18px; flex-shrink: 0;
            cursor: pointer; accent-color: var(--color-primary, #C77B3C);
        }
        .batch-mode .resource-list-row .list-checkbox { display: block; }
        .resource-list-row.selected { border-color: var(--color-primary, #C77B3C); background: rgba(199,123,60,0.04); }

        /* ===== 分页 ===== */
        .pagination { display: flex; justify-content: center; align-items: center; gap: 16px; padding: 24px 0; }
        .page-btn {
            padding: 8px 16px; border: 1px solid #E5E7EB; border-radius: 8px;
            background: #fff; font-size: 14px; cursor: pointer; transition: all 0.2s;
        }
        .page-btn:hover:not(:disabled) { border-color: var(--color-primary, #C77B3C); color: var(--color-primary, #C77B3C); }
        .page-btn:disabled { opacity: 0.4; cursor: default; }
        .page-info { font-size: 14px; color: var(--text-3, #9A8A76); }

        /* ===== 空状态 ===== */
        .empty-state { text-align: center; padding: 80px 20px; color: var(--text-3, #9A8A76); }
        .empty-state-icon { width: 64px; height: 64px; margin: 0 auto 16px; opacity: 0.4; display: flex; align-items: center; justify-content: center; }
        .empty-state-title { font-size: 16px; font-weight: 600; color: var(--text-1, #33291E); margin-bottom: 8px; }
        .empty-state-desc { font-size: 13px; margin-bottom: 24px; line-height: 1.5; }
        .empty-state-actions { display: flex; gap: 12px; justify-content: center; }

        /* ===== 保留的旧样式 ===== */
        .btn-primary {
            padding: 10px 24px; background: var(--color-primary, #C77B3C); color: #fff;
            border: none; border-radius: 8px; font-size: 14px; font-weight: 600;
            cursor: pointer; transition: background 0.2s;
        }
        .btn-primary:hover { background: #B5692E; }
        .btn-outline {
            padding: 8px 16px; background: #fff; color: var(--text-1, #33291E);
            border: 1px solid #E5E7EB; border-radius: 8px; font-size: 14px;
            cursor: pointer; transition: all 0.2s;
        }
        .btn-outline:hover { border-color: var(--color-primary, #C77B3C); color: var(--color-primary, #C77B3C); }
        .btn-delete {
            padding: 6px 12px; background: #fff; color: #EF4444;
            border: 1px solid #FECACA; border-radius: 6px; font-size: 13px;
            cursor: pointer; transition: all 0.2s;
        }
        .btn-delete:hover { background: #EF4444; color: #fff; border-color: #EF4444; }

        /* Preview Modal */
        .modal-mask {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-mask.active { display: flex; }
        .modal {
            background: var(--color-card);
            width: min(880px, 92vw);
            max-height: 86vh;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .modal-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid var(--color-border);
        }
        .modal-title { font-size: 16px; font-weight: 600; color: var(--color-text); }
        .modal-close {
            background: transparent; border: none; cursor: pointer;
            color: #6B7280; font-size: 20px; line-height: 1;
            width: 28px; height: 28px; border-radius: 6px;
            display: inline-flex; align-items: center; justify-content: center;
        }
        .modal-close:hover { background: var(--color-bg); color: var(--color-text); }
        .modal-body {
            padding: 20px;
            overflow-y: auto;
            flex: 1;
            font-size: 14px;
            line-height: 1.7;
            color: var(--color-text);
        }
        .modal-body pre {
            background: #F2EBDF;
            border: 1px solid var(--color-border);
            border-radius: 8px;
            padding: 12px;
            white-space: pre-wrap;
            word-break: break-word;
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            font-size: 13px;
            color: var(--color-text);
        }
        .modal-body .md-text { white-space: pre-wrap; word-break: break-word; }
        .modal-body .md-rendered { line-height: 1.7; word-break: break-word; }
        .modal-body .md-rendered h1, .modal-body .md-rendered h2, .modal-body .md-rendered h3 { margin: 16px 0 8px; }
        .modal-body .md-rendered p { margin: 8px 0; }
        .modal-body .md-rendered ul, .modal-body .md-rendered ol { padding-left: 24px; margin: 8px 0; }
        .modal-body .md-rendered pre { background: #f6f8fa; border-radius: 6px; padding: 12px; overflow-x: auto; }
        .modal-body .md-rendered code { font-family: 'Fira Code', Consolas, monospace; font-size: 13px; }
        .modal-body .md-rendered blockquote { border-left: 4px solid #C77B3C; padding-left: 12px; color: #555; margin: 8px 0; }
        .preview-quiz-item {
            padding: 12px 14px;
            border: 1px solid var(--color-border);
            border-radius: 8px;
            margin-bottom: 12px;
            background: #FAFBFD;
        }
        .preview-quiz-q { font-weight: 600; margin-bottom: 8px; }
        .preview-quiz-opt { padding: 4px 0; color: #374151; }
        .preview-quiz-ans { margin-top: 8px; color: #C77B3C; font-size: 13px; }
        .preview-quiz-exp { margin-top: 4px; color: #6B7280; font-size: 13px; }
        .preview-loading { text-align: center; color: #6B7280; padding: 30px 0; }

        /* Mindmap Tree */
        .mm-tree, .mm-tree ul {
            list-style: none;
            padding-left: 18px;
            position: relative;
        }
        .mm-tree { padding-left: 0; }
        .mm-tree li {
            position: relative;
            padding: 4px 0 4px 16px;
            font-size: 14px;
            color: var(--color-text);
        }
        .mm-tree li::before {
            content: '';
            position: absolute;
            left: 0; top: 14px;
            width: 10px; height: 1px;
            background: #B0BEC5;
        }
        .mm-tree li::after {
            content: '';
            position: absolute;
            left: 0; top: 0;
            width: 1px; height: 100%;
            background: var(--color-border);
        }
        .mm-tree > li::after { display: none; }
        .mm-tree li:last-child::after { height: 14px; }
        .mm-node {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            background: #F5E9D8;
            color: #C77B3C;
            font-weight: 600;
            font-size: 13.5px;
        }
        .mm-tree li li .mm-node {
            background: var(--color-bg);
            color: var(--color-text);
            font-weight: 500;
        }
        .mm-tree li li li .mm-node {
            background: transparent;
            color: #374151;
            font-weight: 400;
            padding: 2px 0;
        }

        /* PDF iframe */
        .pdf-frame {
            width: 100%;
            height: 70vh;
            border: 1px solid var(--color-border);
            border-radius: 8px;
        }
        .pdf-fallback {
            margin-top: 10px;
            font-size: 13px;
            color: #6B7280;
        }
        .anim-toolbar {
            display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
        }
        .anim-frame {
            width: 100%; height: 540px; border: 1px solid var(--color-border);
            border-radius: 8px; background: #fff;
        }
        .anim-src {
            background: #0d1117; color: #c9d1d9; border-radius: 8px; padding: 14px;
            overflow: auto; max-height: 540px;
            font-family: 'Fira Code', Consolas, monospace; font-size: 12.5px; line-height: 1.5;
        }
    </style>
</head>
<body>
    <div id="view">
    <div class="app-layout">
        <div class="app-content">
        <div class="app-body">
            <h1 class="page-title">我的资源库</h1>
            <p class="page-subtitle">浏览、管理和搜索已生成的学习资源，预览内容或删除不需要的资源。</p>

            <!-- Tab Bar -->
            <div class="tab-bar">
                <button class="tab-btn active" data-tab="resources">我的资源</button>
                <button class="tab-btn" data-tab="upload">上传文档</button>
            </div>

            <!-- Tab: Resources -->
            <div id="tab-resources">
            <!-- Stats Strip -->
            <div class="stat-row" id="stats-bar">
                <div class="stat-item" data-type="doc" onclick="filterByType('doc')">
                    <i data-lucide="file-text" class="stat-icon"></i>
                    <div class="stat-num" id="stat-doc">-</div>
                    <div class="stat-lbl">学习文档</div>
                </div>
                <div class="stat-item" data-type="mindmap" onclick="filterByType('mindmap')">
                    <i data-lucide="git-fork" class="stat-icon"></i>
                    <div class="stat-num" id="stat-mindmap">-</div>
                    <div class="stat-lbl">思维导图</div>
                </div>
                <div class="stat-item" data-type="quiz" onclick="filterByType('quiz')">
                    <i data-lucide="clipboard-list" class="stat-icon"></i>
                    <div class="stat-num" id="stat-quiz">-</div>
                    <div class="stat-lbl">测验</div>
                </div>
                <div class="stat-item" data-type="code" onclick="filterByType('code')">
                    <i data-lucide="code-2" class="stat-icon"></i>
                    <div class="stat-num" id="stat-code">-</div>
                    <div class="stat-lbl">代码示例</div>
                </div>
                <div class="stat-item" data-type="summary" onclick="filterByType('summary')">
                    <i data-lucide="scroll-text" class="stat-icon"></i>
                    <div class="stat-num" id="stat-summary">-</div>
                    <div class="stat-lbl">知识总结</div>
                </div>
                <div class="stat-item" data-type="animation" onclick="filterByType('animation')">
                    <i data-lucide="clapperboard" class="stat-icon"></i>
                    <div class="stat-num" id="stat-animation">-</div>
                    <div class="stat-lbl">动画演示</div>
                </div>
            </div>

            <!-- Filter Bar -->
            <div class="filter-bar">
                <select class="filter-select" id="type-filter" onchange="onFilterChange()">
                    <option value="">全部类型</option>
                    <option value="doc">学习文档</option>
                    <option value="mindmap">思维导图</option>
                    <option value="quiz">测验</option>
                    <option value="code">代码示例</option>
                    <option value="summary">知识总结</option>
                    <option value="animation">动画演示</option>
                </select>
                <select class="filter-select" id="sort-select" onchange="onSortChange()">
                    <option value="newest">最新优先</option>
                    <option value="oldest">最旧优先</option>
                    <option value="type">按类型</option>
                    <option value="name">按名称</option>
                </select>
                <div class="filter-input-wrapper">
                    <i data-lucide="search" class="search-icon"></i>
                    <input type="text" class="filter-input" id="search-input" placeholder="搜索资源标题..." oninput="onSearchInput()">
                    <button class="filter-input-clear" id="search-clear" onclick="clearSearch()">&times;</button>
                </div>
                <button class="btn-ghost" id="batch-toggle" onclick="toggleBatchMode()">批量选择</button>
                <span class="btn-group">
                    <button class="btn-ghost active" id="btn-view-grid" onclick="setViewMode('grid')">网格</button>
                    <button class="btn-ghost" id="btn-view-list" onclick="setViewMode('list')">列表</button>
                </span>
                <button class="btn-ghost" onclick="loadResources()">刷新</button>
            </div>

            <!-- Resource Container (grid or list view) -->
            <div class="resource-grid" id="resource-grid"></div>

        <div class="modal">
            <div class="modal-header">
                <div class="modal-title" id="preview-title">资源预览</div>
                <button class="modal-close" onclick="closePreview()">&times;</button>
            </div>
            <div class="modal-body" id="preview-body">
                <div class="preview-loading">加载中...</div>
            </div>

    <!-- 浏览时长上报逻辑（独立全局脚本） -->
    <script>
        // 全局变量存储计时状态（比 dataset 更可靠）
        window.__previewStartTime = 0;
        window.__previewResourceId = '';
        window.__previewKpId = '';

        function closePreview() {
            var modal = document.getElementById('preview-modal');
            modal.classList.remove('active');
            var startTime = window.__previewStartTime;
            var resourceId = window.__previewResourceId;
            var kpId = window.__previewKpId || '';
            console.log('[closePreview] startTime=' + startTime + ', resourceId=' + resourceId);
            if (startTime && resourceId) {
                var durationSec = Math.round((Date.now() - startTime) / 1000);
                console.log('[closePreview] durationSec=' + durationSec);
                if (durationSec >= 1) {
                    var uid = localStorage.getItem('user_id');
                    if (uid) {
                        var payload = { resource_id: resourceId, action: 'view', duration_seconds: durationSec };
                        if (kpId && kpId.indexOf('kp_') === 0) payload.kp_id = kpId;
                        var token = localStorage.getItem('access_token');
                        var headers = { 'Content-Type': 'application/json' };
                        if (token) headers['Authorization'] = 'Bearer ' + token;
                        console.log('[closePreview] posting:', JSON.stringify(payload));
                        fetch('/records?user_id=' + encodeURIComponent(uid), {
                            method: 'POST',
                            headers: headers,
                            body: JSON.stringify(payload),
                            keepalive: true
                        }).then(function(r) {
                            console.log('[closePreview] response status:', r.status);
                        }).catch(function(e) {
                            console.error('[closePreview] fetch error:', e);
                        });
                    }
                }
            }
            window.__previewStartTime = 0;
            window.__previewResourceId = '';
            window.__previewKpId = '';
        }
        document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closePreview(); });
        window.__beforeunloadHandler = function() {
            if (window.__previewStartTime && window.__previewResourceId) closePreview();
        };
        window.addEventListener('beforeunload', window.__beforeunloadHandler);
    </script>

    <script type="module">
        import { isLoggedIn, getUserId, clearAuth, getResourceStats, getResources, getResource, deleteResource, importDocumentAsync, getImportStatus, buildKg, getKgBuildStatusByDoc, postLearningRecord, getClientConfig } from './assets/api.js?v=3';
        import { showToast } from './assets/toast.js';
        import { showDialog } from './assets/dialog.js';
        import { registerPage, initSidebar } from './assets/nav.js';

        if (!isLoggedIn()) {
            window.location.href = 'auth.html';
        }

        const userId = getUserId();
        let _pollKgTimers = [];

        async function init() {
            initSidebar('library');

            // Tab switching
            document.querySelectorAll('.tab-btn').forEach(tab => {
                tab.addEventListener('click', function() {
                    document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    const target = this.dataset.tab;
                    document.getElementById('tab-resources').style.display = target === 'resources' ? '' : 'none';
                    document.getElementById('tab-upload').style.display = target === 'upload' ? '' : 'none';
                });
            });

            applyUploadAvailability();

            let currentPage = 1;
        let currentFilter = '';
        let currentSearch = '';
        let currentSort = 'newest';
        let viewMode = localStorage.getItem('libraryViewMode') || 'grid';
        let selectedIds = new Set();
        let batchMode = false;
        const pageSize = 18;
        let allResources = [];  // full resource cache
        let searchTimer = null;

        const TYPE_MAP = { doc: '学习文档', mindmap: '思维导图', quiz: '测验', code: '代码示例', summary: '知识总结', animation: '动画演示' };
        const TYPE_COLORS = { doc: '#5B8DB8', mindmap: '#9B85B2', quiz: '#C98A2E', code: '#6E9466', summary: '#C77B3C', animation: '#C9605A' };
        const TYPE_ICONS = { doc: 'file-text', mindmap: 'git-branch', quiz: 'file-question', code: 'terminal', summary: 'layout-list', animation: 'play-circle' };
        const ICON_MAP = { doc: '<i data-lucide="file-text"></i>', mindmap: '<i data-lucide="git-branch"></i>', quiz: '<i data-lucide="file-question"></i>', code: '<i data-lucide="terminal"></i>', summary: '<i data-lucide="layout-list"></i>', animation: '<i data-lucide="play-circle"></i>' };

        async function loadStats() {
            const stats = await getResourceStats(userId);
            if (!stats) return;
            document.getElementById('stat-doc').textContent = stats.doc || 0;
            document.getElementById('stat-mindmap').textContent = stats.mindmap || 0;
            document.getElementById('stat-quiz').textContent = stats.quiz || 0;
            document.getElementById('stat-code').textContent = stats.code || 0;
            document.getElementById('stat-summary').textContent = stats.summary || 0;
            var elAnim = document.getElementById('stat-animation');
            if (elAnim) elAnim.textContent = stats.animation || 0;
            // highlight active filter
            document.querySelectorAll('#stats-bar .stat-item').forEach(function(item) {
                item.classList.toggle('active', item.dataset.type === currentFilter);
            });
        }

        window.filterByType = function(type) {
            if (currentFilter === type) {
                currentFilter = '';
                document.getElementById('type-filter').value = '';
            } else {
                currentFilter = type;
                document.getElementById('type-filter').value = type;
            }
            currentPage = 1;
            loadResources();
            loadStats();
        };

        async function loadResources() {
            currentFilter = document.getElementById('type-filter').value;
            currentSearch = document.getElementById('search-input').value;
            // Fetch all resources (up to 500) for client-side sort/filter/page
            const data = await getResources(userId, { resource_type: '', skip: 0, limit: 500 });
            if (!data || !data.items) {
                allResources = [];
            } else {
                allResources = data.items;
            }
            renderResources();
        }

        function getFilteredAndSorted() {
            let items = [...allResources];
            if (currentFilter) {
                items = items.filter(function(r) { return r.resource_type === currentFilter; });
            }
            if (currentSearch) {
                var q = currentSearch.toLowerCase();
                items = items.filter(function(r) { return r.title && r.title.toLowerCase().indexOf(q) !== -1; });
            }
            // sort
            var sortFns = {
                newest: function(a, b) { return new Date(b.created_at || 0) - new Date(a.created_at || 0); },
                oldest: function(a, b) { return new Date(a.created_at || 0) - new Date(b.created_at || 0); },
                type: function(a, b) {
                    var ta = a.resource_type || ''; var tb = b.resource_type || '';
                    if (ta !== tb) return ta.localeCompare(tb);
                    return new Date(b.created_at || 0) - new Date(a.created_at || 0);
                },
                name: function(a, b) { return (a.title || '').localeCompare(b.title || ''); }
            };
            items.sort(sortFns[currentSort] || sortFns.newest);
            return items;
        }

        function renderResources() {
            var filtered = getFilteredAndSorted();
            var total = filtered.length;
            var totalPages = Math.ceil(total / pageSize) || 1;
            if (currentPage > totalPages) currentPage = totalPages;
            var start = (currentPage - 1) * pageSize;
            var pageItems = filtered.slice(start, start + pageSize);

            // Determine which container to use
            var gridEl = document.getElementById('resource-grid');
            var listEl = document.getElementById('resource-list');
            if (viewMode === 'grid') {
                gridEl.style.display = '';
                listEl.style.display = 'none';
                gridEl.innerHTML = total === 0 ? renderEmptyState() : pageItems.map(renderCard).join('');
            } else {
                gridEl.style.display = 'none';
                listEl.style.display = '';
                listEl.innerHTML = total === 0 ? renderEmptyState() : pageItems.map(renderListRow).join('');
            }

            // Update batch mode visuals
            if (batchMode) {
                document.body.classList.add('batch-mode');
            } else {
                document.body.classList.remove('batch-mode');
            }
            updateBatchBar();

            // Pagination
            renderPagination(total, totalPages);
            lucide.createIcons();

            // Check running KG builds
            var docItems = allResources.filter(function(r) { return r.resource_type === 'doc' && r.kp_id; });
            if (docItems.length) checkRunningKgBuilds(docItems);
        }

        function renderEmptyState() {
            if (currentSearch || currentFilter) {
                return '<div class="empty-state">' +
                    '<div class="empty-state-icon"><i data-lucide="search-x"></i></div>' +
                    '<div class="empty-state-title">没有匹配的资源</div>' +
                    '<div class="empty-state-desc">尝试更换筛选条件或搜索词</div>' +
                    '<div class="empty-state-actions"><button class="btn-outline" onclick="clearSearch();document.getElementById(\'type-filter\').value=\'\';onFilterChange();">清除筛选条件</button></div>' +
                    '</div>';
            }
            return '<div class="empty-state">' +
                '<div class="empty-state-icon"><i data-lucide="library"></i></div>' +
                '<div class="empty-state-title">你的资源库还是空的</div>' +
                '<div class="empty-state-desc">生成学习资源后，它们会自动汇集到这里</div>' +
                '<div class="empty-state-actions"><a class="btn-outline" href="generate.html">前往生成</a><a class="btn-outline" href="pathway.html">浏览知识图谱</a></div>' +
                '</div>';
        }

        function renderCard(r) {
            var typeLabel = TYPE_MAP[r.resource_type] || r.resource_type;
            var accentColor = TYPE_COLORS[r.resource_type] || '#BCAE9C';
            var typeIcon = TYPE_ICONS[r.resource_type] || 'file-text';
            var selected = selectedIds.has(r.id) ? ' selected' : '';
            return '<div class="resource-card' + selected + '" id="card-' + r.id + '">' +
                '<div class="resource-card-accent" style="background:' + accentColor + ';"></div>' +
                '<input type="checkbox" class="card-checkbox" ' + (selectedIds.has(r.id) ? 'checked' : '') + ' onclick="event.stopPropagation();toggleSelect(\'' + r.id + '\')">' +
                '<div class="resource-card-body">' +
                '<div class="resource-card-type">' +
                '<div class="resource-card-type-icon" style="background:' + accentColor + ';"><i data-lucide="' + typeIcon + '"></i></div>' +
                '<span class="resource-card-type-label">' + typeLabel + '</span>' +
                '</div>' +
                '<div class="resource-card-title" title="' + escapeHtml(r.title || '未命名') + '">' + escapeHtml(r.title || '未命名') + '</div>' +
                '<div class="resource-card-meta">' + (r.created_at ? new Date(r.created_at).toLocaleDateString('zh-CN') : '') + '</div>' +
                (r.kp_name ? '<div class="resource-card-kp" title="' + escapeHtml(r.kp_name) + '">' + escapeHtml(r.kp_name) + '</div>' : '') +
                '<div class="resource-card-actions">' +
                (r.resource_type === 'doc' && r.kp_id ? '<button class="btn-card" data-kp-id="' + r.kp_id + '" onclick="event.stopPropagation();handleBuildKg(\'' + r.kp_id + '\')">构建图谱</button>' : '') +
                '<button class="btn-card" onclick="event.stopPropagation();handlePreview(\'' + r.id + '\',\'' + r.resource_type + '\')">预览</button>' +
                (r.resource_type === 'quiz' ? '<button class="btn-card" onclick="event.stopPropagation();location.href=\'evaluate.html\'">测验</button>' : '') +
                '<button class="btn-card danger" onclick="event.stopPropagation();handleDelete(\'' + r.id + '\')">删除</button>' +
                '</div></div></div>';
        }

        function renderListRow(r) {
            var typeLabel = TYPE_MAP[r.resource_type] || r.resource_type;
            var accentColor = TYPE_COLORS[r.resource_type] || '#BCAE9C';
            var typeIcon = TYPE_ICONS[r.resource_type] || 'file-text';
            var selected = selectedIds.has(r.id) ? ' selected' : '';
            return '<div class="resource-list-row' + selected + '" id="row-' + r.id + '">' +
                '<div class="resource-list-accent" style="background:' + accentColor + ';"></div>' +
                '<input type="checkbox" class="list-checkbox" ' + (selectedIds.has(r.id) ? 'checked' : '') + ' onclick="event.stopPropagation();toggleSelect(\'' + r.id + '\')">' +
                '<div class="resource-list-icon" style="background:' + accentColor + ';"><i data-lucide="' + typeIcon + '"></i></div>' +
                '<div class="resource-list-body">' +
                '<div class="resource-list-title">' + escapeHtml(r.title || '未命名') + '</div>' +
                '<div class="resource-list-meta">' + typeLabel + ' · ' + (r.created_at ? new Date(r.created_at).toLocaleDateString('zh-CN') : '') + (r.kp_name ? ' · ' + escapeHtml(r.kp_name) : '') + '</div>' +
                '</div>' +
                '<div class="resource-list-actions">' +
                (r.resource_type === 'doc' && r.kp_id ? '<button class="btn-list" data-kp-id="' + r.kp_id + '" onclick="event.stopPropagation();handleBuildKg(\'' + r.kp_id + '\')">构建图谱</button>' : '') +
                '<button class="btn-list" onclick="event.stopPropagation();handlePreview(\'' + r.id + '\',\'' + r.resource_type + '\')">预览</button>' +
                (r.resource_type === 'quiz' ? '<button class="btn-list" onclick="event.stopPropagation();location.href=\'evaluate.html\'">测验</button>' : '') +
                '<button class="btn-list danger" onclick="event.stopPropagation();handleDelete(\'' + r.id + '\')">删除</button>' +
                '</div></div>';
        }

        function renderPagination(total, totalPages) {
            document.getElementById('pagination').innerHTML = total === 0 ? '' :
                '<button class="page-btn" onclick="changePage(' + (currentPage - 1) + ')" ' + (currentPage <= 1 ? 'disabled' : '') + '>上一页</button>' +
                '<span class="page-info">第 ' + currentPage + ' / ' + totalPages + ' 页（共 ' + total + ' 项）</span>' +
                '<button class="page-btn" onclick="changePage(' + (currentPage + 1) + ')" ' + (currentPage >= totalPages ? 'disabled' : '') + '>下一页</button>';
        }

        function changePage(p) {
            currentPage = p;
            renderResources();
            document.getElementById('resource-grid').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // View toggle
        window.setViewMode = function(mode) {
            viewMode = mode;
            localStorage.setItem('libraryViewMode', mode);
            document.getElementById('btn-view-grid').classList.toggle('active', mode === 'grid');
            document.getElementById('btn-view-list').classList.toggle('active', mode === 'list');
            renderResources();
        };

        // Filter / sort handlers
        window.onFilterChange = function() {
            currentFilter = document.getElementById('type-filter').value;
            currentPage = 1;
            loadResources();
            loadStats();
        };
        window.onSortChange = function() {
            currentSort = document.getElementById('sort-select').value;
            currentPage = 1;
            renderResources();
        };
        window.onSearchInput = function() {
            if (searchTimer) clearTimeout(searchTimer);
            var input = document.getElementById('search-input');
            var clearBtn = document.getElementById('search-clear');
            if (input.value) {
                clearBtn.classList.add('visible');
            } else {
                clearBtn.classList.remove('visible');
            }
            searchTimer = setTimeout(function() {
                currentSearch = input.value;
                currentPage = 1;
                renderResources();
            }, 300);
        };
        window.clearSearch = function() {
            document.getElementById('search-input').value = '';
            document.getElementById('search-clear').classList.remove('visible');
            currentSearch = '';
            currentPage = 1;
            renderResources();
        };

        // Batch mode
        window.toggleBatchMode = function() {
            batchMode = !batchMode;
            if (!batchMode) {
                selectedIds.clear();
            }
            renderResources();
        };
        window.toggleSelect = function(id) {
            if (selectedIds.has(id)) {
                selectedIds.delete(id);
            } else {
                selectedIds.add(id);
            }
            updateBatchBar();
            // Update checkbox visuals
            var cardEl = document.getElementById('card-' + id);
            var rowEl = document.getElementById('row-' + id);
            if (cardEl) cardEl.classList.toggle('selected', selectedIds.has(id));
            if (rowEl) rowEl.classList.toggle('selected', selectedIds.has(id));
        };
        window.selectAll = function() {
            var filtered = getFilteredAndSorted();
            var start = (currentPage - 1) * pageSize;
            var pageItems = filtered.slice(start, start + pageSize);
            var allSelected = pageItems.every(function(r) { return selectedIds.has(r.id); });
            if (allSelected) {
                pageItems.forEach(function(r) { selectedIds.delete(r.id); });
            } else {
                pageItems.forEach(function(r) { selectedIds.add(r.id); });
            }
            renderResources();
        };
        function updateBatchBar() {
            var bar = document.getElementById('batch-bar');
            var countEl = document.getElementById('batch-count');
            if (batchMode) {
                bar.style.display = 'flex';
                countEl.textContent = '已选择 ' + selectedIds.size + ' 项';
            } else {
                bar.style.display = 'none';
            }
        }
        window.batchDelete = async function() {
            if (selectedIds.size === 0) return;
            var ok = await showDialog({ type: 'danger', title: '确定批量删除 ' + selectedIds.size + ' 个资源？', desc: '此操作不可撤销', confirmText: '确认删除' });
            if (!ok) return;
            var ids = Array.from(selectedIds);
            var failed = 0;
            for (var i = 0; i < ids.length; i++) {
                try {
                    await deleteResource(ids[i], userId);
                } catch (e) {
                    failed++;
                }
            }
            if (failed > 0) {
                showToast('删除完成，' + failed + ' 个失败', 'error');
            } else {
                showToast('已删除 ' + ids.length + ' 个资源', 'success');
            }
            selectedIds.clear();
            batchMode = false;
            loadResources();
            loadStats();
        };

        // 恢复正在进行的 KG 构建进度
        async function checkRunningKgBuilds(docItems) {
            for (const r of docItems) {
                try {
                    const s = await getKgBuildStatusByDoc(r.kp_id);
                    if (s && (s.status === 'running' || s.status === 'pending')) {
                        showKgBuildProgress(r.kp_id, s);
                    }
                } catch(e) { /* ignore */ }
            }
        }

        function showKgBuildProgress(kpId, initialStatus) {
            const btn = document.querySelector('[data-kp-id="' + kpId + '"]');
            if (!btn) return;
            // 避免重复添加
            if (btn.parentElement.querySelector('.kg-build-status')) return;
            btn.style.display = 'none';
            const statusEl = document.createElement('div');
            statusEl.className = 'kg-build-status';
            statusEl.style.cssText = 'margin-top:12px;padding:12px;background:#F5E9D8;border-radius:8px;font-size:13px;color:#C77B3C;';
            statusEl.textContent = '构建中: ' + (initialStatus.progress || 0) + '% · ' + (initialStatus.stage || '处理中');
            btn.parentElement.appendChild(statusEl);
            pollKgBuildStatus(kpId, statusEl, btn);
        }

        function pollKgBuildStatus(kpId, statusEl, btn) {
            const poll = async () => {
                try {
                    const s = await getKgBuildStatusByDoc(kpId);
                    if (!s) return _pollKgTimers.push(setTimeout(poll, 3000));
                    if (s.status === 'done' || s.status === 'completed') {
                        statusEl.textContent = '✓ 知识图谱构建完成！';
                        statusEl.style.background = '#E8F5E9';
                        statusEl.style.color = '#10B981';
                    } else if (s.status === 'failed') {
                        statusEl.textContent = '✗ 构建失败: ' + (s.error_message || '未知错误');
                        statusEl.style.background = '#FEF2F2';
                        statusEl.style.color = '#EF4444';
                        if (btn) btn.style.display = '';
                    } else {
                        statusEl.textContent = '构建中: ' + (s.progress || 0) + '% · ' + (s.stage || '处理中');
                        _pollKgTimers.push(setTimeout(poll, 3000));
                    }
                } catch(e) { _pollKgTimers.push(setTimeout(poll, 5000)); }
            };
            _pollKgTimers.push(setTimeout(poll, 3000));
        }

        async function handleBuildKg(kpId) {
            if (!await showDialog({ type: 'normal', title: '确定要为此文档构建知识图谱吗？', desc: '将根据此文档内容自动构建知识点', confirmText: '确认构建' })) return;
            const statusEl = document.createElement('div');
            statusEl.className = 'kg-build-status';
            statusEl.style.cssText = 'margin-top:12px;padding:12px;background:#F5E9D8;border-radius:8px;font-size:13px;color:#C77B3C;';
            statusEl.textContent = '正在提交知识图谱构建任务...';
            const btn = document.querySelector('[data-kp-id="' + kpId + '"]');
            btn.parentElement.appendChild(statusEl);
            btn.style.display = 'none';
            try {
                const result = await buildKg(kpId, userId);
                if (result && result.task_id) {
                    statusEl.textContent = '任务已提交，正在构建...';
                    pollKgBuildStatus(kpId, statusEl, btn);
                } else {
                    throw new Error(result?.detail || '提交失败');
                }
            } catch (e) {
                statusEl.textContent = '✗ 提交失败: ' + e.message;
                statusEl.style.background = '#FEF2F2';
                statusEl.style.color = '#EF4444';
                btn.style.display = '';
            }
        }

        const SUPPORTED_EXTENSIONS = ['.pdf', '.docx', '.doc', '.md', '.txt'];

        let _uploadEnabled = true;
        let _uploadDisabledMsg = '';

        // 根据服务端开关决定上传区域是否可用；关闭时展示提示并禁用交互，其余功能不受影响
        async function applyUploadAvailability() {
            try {
                const cfg = await getClientConfig();
                if (!cfg) return;
                _uploadEnabled = cfg.upload_enabled !== false;
                _uploadDisabledMsg = cfg.upload_disabled_message || '文档上传功能暂时关闭。';
            } catch (e) {
                return;  // 拉取失败时保持默认（可用），避免误伤
            }
            if (_uploadEnabled) return;

            const area = document.querySelector('.import-area');
            if (area) {
                area.onclick = null;
                area.style.cursor = 'not-allowed';
                area.style.opacity = '0.6';
                const textEl = area.querySelector('.import-text');
                if (textEl) textEl.textContent = _uploadDisabledMsg;
            }
            const fileInput = document.getElementById('file-input');
            if (fileInput) fileInput.disabled = true;
            const importBtn = document.getElementById('import-btn');
            if (importBtn) {
                importBtn.disabled = true;
                importBtn.textContent = '暂不可用';
            }
        }

        function handleFileSelect(input) {
            if (!_uploadEnabled) {
                showToast(_uploadDisabledMsg, 'error');
                input.value = '';
                return;
            }
            if (input.files[0]) {
                const name = input.files[0].name.toLowerCase();
                const ext = '.' + name.split('.').pop();
                if (!SUPPORTED_EXTENSIONS.includes(ext)) {
                    showToast('不支持的文件格式：' + ext, 'error');
                    input.value = '';
                    return;
                }
                document.querySelector('.import-form').style.display = 'block';
                document.querySelector('.import-text').textContent = input.files[0].name;
            }
        }

        async function handleImport() {
            if (!_uploadEnabled) {
                showToast(_uploadDisabledMsg, 'error');
                return;
            }
            const fileInput = document.getElementById('file-input');
            const file = fileInput.files[0];
            if (!file) return;
            const title = document.getElementById('import-title').value.trim();
            console.log('[handleImport] title value:', JSON.stringify(title));
            const btn = document.getElementById('import-btn');
            const status = document.getElementById('import-status');
            btn.disabled = true;
            btn.textContent = '导入中...';
            status.style.display = 'block';
            status.textContent = '正在上传并解析文档...';
            try {
                const result = await importDocumentAsync(userId, file, title);
                if (result && result.task_id) {
                    status.textContent = '文档已提交，正在后台处理...';
                    // Poll
                    const poll = async () => {
                        const s = await getImportStatus(result.task_id);
                        if (!s) return setTimeout(poll, 2000);
                        if (s.status === 'done') {
                            status.textContent = '导入完成！';
                            btn.disabled = false;
                            btn.textContent = '开始导入';
                            loadResources();
                        } else if (s.status === 'failed') {
                            status.textContent = '导入失败: ' + (s.error_message || '');
                            btn.disabled = false;
                            btn.textContent = '开始导入';
                        } else {
                            status.textContent = s.status_message || '处理中...';
                            setTimeout(poll, 2000);
                        }
                    };
                    poll();
                } else {
                    throw new Error(result?.detail || '导入失败');
                }
            } catch (e) {
                status.textContent = '导入失败: ' + e.message;
                btn.disabled = false;
                btn.textContent = '开始导入';
            }
        }

        window.handleDelete = handleDelete;
        window.handleBuildKg = handleBuildKg;
        async function handleDelete(resourceId) {
            const ok = await showDialog({ type: 'danger', title: '确定删除此资源？', desc: '删除后可在5秒内撤销', confirmText: '确认删除' });
            if (!ok) return;
            try {
                await deleteResource(resourceId, userId);
                selectedIds.delete(resourceId);
                loadResources();
                loadStats();
            } catch (e) {
                showToast('删除失败: ' + e.message, 'error');
            }
        }
        window.handleFileSelect = handleFileSelect;
        window.handleImport = handleImport;
        window.changePage = changePage;
        window.loadResources = loadResources;

        // ---- marked.js 配置：代码块使用 highlight.js 高亮 ----
        if (typeof marked !== 'undefined') {
            marked.setOptions({
                highlight: function(code, lang) {
                    if (lang && hljs.getLanguage(lang)) {
                        return hljs.highlight(code, { language: lang }).value;
                    }
                    return hljs.highlightAuto(code).value;
                },
                breaks: true,
                gfm: true
            });
        }

        // ---- 资源预览 ----
        function escapeHtml(s) {
            if (s === null || s === undefined) return '';
            return String(s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function renderMindmapTree(node) {
            if (!node || typeof node !== 'object') return '';
            // 兼容 {tree: {...}} 外层包裹
            if (node.tree && !node.name && !node.children) node = node.tree;
            const name = node.name || node.title || node.label || '未命名';
            const children = Array.isArray(node.children) ? node.children : [];
            const childHtml = children.length
                ? `<ul>${children.map(c => renderMindmapTree(c)).join('')}</ul>`
                : '';
            return `<li><span class="mm-node">${escapeHtml(name)}</span>${childHtml}</li>`;
        }

        function extractPdfFilename(content) {
            if (!content || typeof content !== 'string') return null;
            // 优先精确匹配导入描述：已导入 PDF：xxx.pdf（兼容全/半角冒号）
            const re1 = new RegExp('已导入\\s*PDF\\s*[\uff1a:]\\s*(.+?\\.pdf)', 'i');
            let m = content.match(re1);
            if (m) return m[1].trim();
            // 降级：取第一个 .pdf 前的连续非分隔符文本（排除全/半角冒号与空白）
            const re2 = new RegExp('([^\\s/\\\\:\uff1a*?"<>|]+\\.pdf)', 'i');
            m = content.match(re2);
            return m ? m[1].trim() : null;
        }

        function renderPreview(r) {
            const type = r.resource_type;
            if (type === 'doc' || type === 'summary') {
                const text = r.content || '（暂无内容）';
                // doc 类型优先识别 PDF：这里 content 通常是「已导入 PDF：xxx.pdf，共 N 个文本块」
                if (type === 'doc') {
                    const fname = extractPdfFilename(text);
                    if (fname) {
                        const url = `/documents/file/${encodeURIComponent(fname)}`;
                        return `
                            <div style="margin-bottom:10px;color:#6B7280;font-size:13px;">文件：${escapeHtml(fname)}
                                · <a href="${url}" target="_blank" style="color:#C77B3C;text-decoration:none;">在新标签页打开</a>
                            </div>
                            <iframe class="pdf-frame" src="${url}" title="PDF 预览"></iframe>
                            <div class="pdf-fallback">若浏览器未内置 PDF 查看器，请点击上方「在新标签页打开」。</div>
                        `;
                    }
                }
                // 使用 marked.js 渲染 markdown（保护 LaTeX 公式不被 marked 破坏）
                if (typeof marked !== 'undefined' && marked.parse) {
                    try {
                        const mathPlaceholders = [];
                        // 先保护 $$...$$ 块级公式
                        let processed = text.replace(/\$\$([\s\S]*?)\$\$/g, (m) => {
                            mathPlaceholders.push(m);
                            return `\x00MATH${mathPlaceholders.length - 1}\x00`;
                        });
                        // 再保护 $...$ 行内公式（不匹配转义的 \$）
                        processed = processed.replace(/(?<!\$)\$(?!\$)(.+?)(?<!\$)\$(?!\$)/g, (m) => {
                            mathPlaceholders.push(m);
                            return `\x00MATH${mathPlaceholders.length - 1}\x00`;
                        });
                        let html = marked.parse(processed);
                        // 还原公式占位符
                        html = html.replace(/\x00MATH(\d+)\x00/g, (_, idx) => mathPlaceholders[parseInt(idx)]);
                        return `<div class="md-rendered">${html}</div>`;
                    } catch (e) {
                        console.warn('marked.parse failed:', e);
                    }
                }
                return `<div class="md-text">${escapeHtml(text)}</div>`;
            }
            if (type === 'code') {
                const cj = r.content_json || {};
                let code = cj.code || '';
                let lang = cj.language || '';
                // fallback: 从 content 中提取代码块
                if (!code && r.content) {
                    const raw = r.content;
                    const blockMatch = raw.match(/```(\w*)\s*\n([\s\S]*?)```/);
                    if (blockMatch) {
                        lang = blockMatch[1] || 'python';
                        code = blockMatch[2].trim();
                    } else {
                        code = raw;
                    }
                }
                code = code || '（暂无代码）';
                const langLabel = lang ? `<div style="color:#6B7280;font-size:12px;margin-bottom:8px;">语言：${escapeHtml(lang)}</div>` : '';
                // 使用 highlight.js 语法高亮
                let highlighted;
                try {
                    highlighted = lang && hljs.getLanguage(lang)
                        ? hljs.highlight(code, { language: lang }).value
                        : hljs.highlightAuto(code).value;
                } catch (e) {
                    highlighted = escapeHtml(code);
                }
                return `${langLabel}<pre><code class="hljs">${highlighted}</code></pre>`;
            }
            if (type === 'mindmap') {
                const cj = r.content_json || {};
                // 根节点可能被 {tree: {...}} 包裹
                const root = cj.tree && !cj.name ? cj.tree : cj;
                if (!root || (!root.name && !Array.isArray(root.children))) {
                    return '<div style="color:#6B7280;">（暂无内容）</div>';
                }
                return `<ul class="mm-tree">${renderMindmapTree(root)}</ul>`;
            }
            if (type === 'quiz') {
                const items = (r.content_json && r.content_json.items) || [];
                if (!items.length) return '<div style="color:#6B7280;">（暂无题目）</div>';
                return items.map((q, i) => {
                    const opts = Array.isArray(q.options)
                        ? q.options.map((o, idx) => `<div class="preview-quiz-opt">${String.fromCharCode(65 + idx)}. ${escapeHtml(o)}</div>`).join('')
                        : '';
                    const ans = q.answer !== undefined ? `<div class="preview-quiz-ans">参考答案：${escapeHtml(Array.isArray(q.answer) ? q.answer.join(', ') : q.answer)}</div>` : '';
                    const exp = q.explanation ? `<div class="preview-quiz-exp">解析：${escapeHtml(q.explanation)}</div>` : '';
                    return `<div class="preview-quiz-item"><div class="preview-quiz-q">${i + 1}. ${escapeHtml(q.question || q.stem || '')}</div>${opts}${ans}${exp}</div>`;
                }).join('');
            }
            if (type === 'animation') {
                const cj = r.content_json || {};
                let sketch = cj.code || '';
                if (!sketch && r.content) {
                    const m = r.content.match(/```(?:javascript|js)?\s*\n([\s\S]*?)```/i);
                    sketch = m ? m[1].trim() : r.content;
                }
                if (!sketch || sketch.indexOf('defineAnimation') === -1) {
                    return '<div style="color:#6B7280;">（暂无可渲染的动画）</div>';
                }
                return `
                    <div class="anim-toolbar">
                        <button id="anim-viewsrc" class="btn-sm btn-sm-outline" type="button">查看源码</button>
                        <span style="color:#9CA3AF;font-size:12px;">播放控制在动画画面内</span>
                    </div>
                    <iframe id="anim-frame" class="anim-frame" sandbox="allow-scripts" title="教学动画"></iframe>
                    <pre id="anim-src" class="anim-src" style="display:none;"><code>${escapeHtml(sketch)}</code></pre>
                `;
            }
            return `<pre>${escapeHtml(JSON.stringify(r, null, 2))}</pre>`;
        }

        // 缓存 anim-runtime 源码
        let __animRuntimeSrc = null;
        async function getAnimRuntimeSrc() {
            if (__animRuntimeSrc !== null) return __animRuntimeSrc;
            try {
                const resp = await fetch('./assets/anim-runtime.js');
                __animRuntimeSrc = await resp.text();
            } catch (e) { __animRuntimeSrc = ''; }
            return __animRuntimeSrc;
        }

        async function mountAnimation(r) {
            const frame = document.getElementById('anim-frame');
            if (!frame) return;
            const cj = r.content_json || {};
            let sketch = cj.code || '';
            if (!sketch && r.content) {
                const m = r.content.match(/```(?:javascript|js)?\s*\n([\s\S]*?)```/i);
                sketch = m ? m[1].trim() : r.content;
            }
            const runtime = await getAnimRuntimeSrc();
            const srcdoc = `<!DOCTYPE html><html><head><meta charset="utf-8">
<style>
  html,body{margin:0;padding:0;background:#fff;overflow:hidden;font-family:system-ui,-apple-system,'Microsoft YaHei',sans-serif;}
  #anim-root{position:relative;}
  #anim-canvas-holder{position:relative;}
  #anim-controls{display:flex;gap:8px;padding:8px 4px 0;}
  #anim-controls button{font-size:13px;padding:4px 12px;border:1px solid #D1D5DB;background:#fff;border-radius:6px;cursor:pointer;color:#374151;}
  #anim-controls button:hover{background:#F3F4F6;}
  .katex{font-size:1em;}
</style>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
</head><body>
<div id="anim-root"><div id="anim-canvas-holder"></div></div>
<div id="anim-controls">
  <button id="anim-playpause" type="button">⏸ 暂停</button>
  <button id="anim-replay" type="button">↻ 重播</button>
</div>
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"><\/script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"><\/script>
<script>${runtime}<\/script>
<script>
window.onerror=function(m){var e=document.getElementById('anim-root');if(e){e.innerHTML='<div style="padding:24px;color:#EF4444;font-size:14px">⚠️ 动画运行出错：'+m+'</div>';}return true;};
try {
${sketch}
} catch(err){ window.onerror(err.message); }
<\/script>
</body></html>`;
            frame.srcdoc = srcdoc;

            const viewBtn = document.getElementById('anim-viewsrc');
            const srcPre = document.getElementById('anim-src');
            if (viewBtn && srcPre) {
                viewBtn.onclick = function () {
                    const showing = srcPre.style.display !== 'none';
                    srcPre.style.display = showing ? 'none' : 'block';
                    frame.style.display = showing ? 'block' : 'none';
                    viewBtn.textContent = showing ? '查看源码' : '返回动画';
                };
            }
        }

        async function handlePreview(resourceId, resourceType) {
            const modal = document.getElementById('preview-modal');
            const body = document.getElementById('preview-body');
            const titleEl = document.getElementById('preview-title');
            titleEl.textContent = '资源预览';
            body.innerHTML = '<div class="preview-loading">加载中...</div>';
            modal.classList.add('active');
            // 将计时信息存在全局变量上
            window.__previewStartTime = Date.now();
            window.__previewResourceId = resourceId;
            window.__previewKpId = '';
            console.log('[handlePreview] started, resourceId=' + resourceId + ', startTime=' + window.__previewStartTime);
            try {
                const r = await getResource(resourceId, userId);
                if (!r || r.detail) {
                    body.innerHTML = `<div style="color:#EF4444;">加载失败：${escapeHtml(r?.detail || '未知错误')}</div>`;
                    return;
                }
                titleEl.textContent = `${TYPE_MAP[r.resource_type] || r.resource_type} · ${r.title || '未命名'}`;
                body.innerHTML = renderPreview(r);
                if (r.kp_id) {
                    window.__previewKpId = r.kp_id;
                }
                // 动画类型：挂载沙箱 iframe
                if (r.resource_type === 'animation') {
                    mountAnimation(r);
                }
                // 渲染 LaTeX 公式
                if (typeof renderMathInElement !== 'undefined') {
                    renderMathInElement(body, {
                        delimiters: [
                            { left: '$$', right: '$$', display: true },
                            { left: '$', right: '$', display: false },
                            { left: '\\[', right: '\\]', display: true },
                            { left: '\\(', right: '\\)', display: false }
                        ],
                        throwOnError: false
                    });
                }
            } catch (e) {
                body.innerHTML = `<div style="color:#EF4444;">加载失败：${escapeHtml(e.message)}</div>`;
            }
        }

        // closePreview 已在上方独立 script 中定义
        window.handlePreview = handlePreview;

        // 支持 URL 参数 ?type=doc|mindmap|quiz|code|summary 预设筛选（来自首页卫星卡）
        const _typeParam = new URLSearchParams(window.location.search).get('type');
        if (_typeParam) {
            const _sel = document.getElementById('type-filter');
            if (_sel && [...(_sel.options)].some(o => o.value === _typeParam)) {
                _sel.value = _typeParam;
                currentFilter = _typeParam;
            }
        }

        // Init view mode buttons
        document.getElementById('btn-view-grid').classList.toggle('active', viewMode === 'grid');
        document.getElementById('btn-view-list').classList.toggle('active', viewMode === 'list');

        loadStats();
        loadResources();

            // 支持 URL 参数 ?preview=resourceId 自动打开资源预览
            const _previewId = new URLSearchParams(window.location.search).get('preview');
            if (_previewId) {
                setTimeout(() => handlePreview(_previewId), 300);
            }
        }

        function destroy() {
            if (searchTimer) { clearTimeout(searchTimer); searchTimer = null; }
            _pollKgTimers.forEach(id => clearTimeout(id));
            _pollKgTimers = [];
            if (window.__beforeunloadHandler) {
                window.removeEventListener('beforeunload', window.__beforeunloadHandler);
            }
        }

        registerPage('library', init, destroy);
        init();
    </script>
    <script>lucide.createIcons();</script>
    <script src="./assets/tracker.js"></script>
    <script type="module" src="./assets/assistant.js"></script>

</body>
