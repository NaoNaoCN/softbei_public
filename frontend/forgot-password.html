<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忘记密码 - 个性化学习助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #F7F8FC;
            color: #1E1E2E;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            width: 420px;
            background: #fff;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo h1 { font-size: 24px; color: #4F6EF7; font-weight: 700; }
        .logo p { font-size: 14px; color: #4B5563; margin-top: 8px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 14px; color: #374151; margin-bottom: 6px; font-weight: 500; }
        .form-group input {
            width: 100%; padding: 12px 16px; border: 2px solid #E5E7EB; border-radius: 8px;
            font-size: 15px; color: #1E1E2E; outline: none; transition: border-color 0.2s;
        }
        .form-group input:focus { border-color: #4F6EF7; }
        .btn {
            width: 100%; padding: 14px; background: #4F6EF7; color: #fff; border: none;
            border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.2s;
        }
        .btn:hover { background: #3B5DE7; }
        .btn:disabled { background: #9CA3AF; cursor: not-allowed; }
        .message { margin-top: 16px; padding: 12px; border-radius: 8px; font-size: 14px; text-align: center; display: none; }
        .message.success { background: #D1FAE5; color: #065F46; display: block; }
        .message.error { background: #FEE2E2; color: #991B1B; display: block; }
        .back-link { text-align: center; margin-top: 20px; }
        .back-link a { font-size: 14px; color: #4F6EF7; text-decoration: none; }
        .back-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">
        <h1>忘记密码</h1>
        <p>输入注册邮箱，我们将发送重置链接</p>
    </div>
    <form id="forgotForm">
        <div class="form-group">
            <label for="email">邮箱地址</label>
            <input type="email" id="email" placeholder="请输入注册时使用的邮箱" required>
        </div>
        <button type="submit" class="btn" id="submitBtn">发送重置邮件</button>
    </form>
    <div id="message" class="message"></div>
    <div class="back-link">
        <a href="/app/auth.html">返回登录</a>
    </div>
</div>

<script>
document.getElementById('forgotForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const btn = document.getElementById('submitBtn');
    const msg = document.getElementById('message');

    btn.disabled = true;
    btn.textContent = '发送中...';
    msg.className = 'message';

    try {
        const res = await fetch('/auth/forgot-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email }),
        });
        const data = await res.json();
        if (res.ok) {
            msg.className = 'message success';
            msg.textContent = data.message;
        } else {
            msg.className = 'message error';
            msg.textContent = data.detail || '发送失败，请稍后再试';
        }
    } catch (err) {
        msg.className = 'message error';
        msg.textContent = '网络错误，请稍后再试';
    } finally {
        btn.disabled = false;
        btn.textContent = '发送重置邮件';
    }
});
</script>
</body>
</html>
