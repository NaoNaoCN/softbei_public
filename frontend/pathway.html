        function renderProgressStepper(items, completed) {
            if (items.length === 0) return '';
            let html = '<div class="progress-stepper">';
            items.forEach((item, idx) => {
                if (idx > 0) {
                    const connClass = idx <= completed ? 'done' : 'pending';
                    html += `<div class="progress-connector ${connClass}"></div>`;
                }
                const isCompleted = item.is_completed;
                const isCurrent = !isCompleted && idx === completed;
                let nodeClass, nodeContent;
                if (isCompleted) { nodeClass = 'done'; nodeContent = '&#10003;'; }
                else if (isCurrent) { nodeClass = 'current'; nodeContent = idx + 1; }
                else { nodeClass = 'pending'; nodeContent = idx + 1; }
                html += `<div class="progress-node ${nodeClass}" onclick="scrollToStep(${idx})" title="第${idx+1}步: ${escapeHtml(item.kp_name || item.kp_id || '')}">${nodeContent}</div>`;
            });
            html += '</div>';
            return html;
        }

        function scrollToStep(idx) {
            const steps = document.querySelectorAll('#roadmap-steps .step-row');
            if (steps[idx]) {
                steps[idx].scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        // === 步骤摘要信息生成 ===
        function buildStepSummary(item) {
            // 基于现有数据的摘要：展示资源类型和状态
            const parts = [];
            if (item.is_completed) {
                parts.push('已完成');
            } else {
                parts.push('待学习');
            }
            const kpName = item.kp_name || item.kp_id || '';
            if (kpName) {
                // 截断过长的名称用于摘要
            }
            return parts.join(' · ');
        }

        // === 步骤展开详情（手风琴模式）===
        async function toggleStepExpand(rowEl, kpId, itemId) {
            const wasExpanded = rowEl.classList.contains('expanded');
            // 收起之前展开的
            if (expandedStepEl && expandedStepEl !== rowEl) {
                expandedStepEl.classList.remove('expanded');
            }
            if (wasExpanded) {
                rowEl.classList.remove('expanded');
                expandedStepEl = null;
                return;
            }
            rowEl.classList.add('expanded');
            expandedStepEl = rowEl;

            const expandDiv = document.getElementById('step-expand-' + itemId);
            if (!expandDiv || expandDiv.dataset.loaded) return;
            expandDiv.dataset.loaded = '1';

            // 加载关联资源
            let resourcesHtml = '';
            try {
                let resources = kpResourcesCache[kpId];
                if (!resources) {
                    resources = await getResources(userId, { kp_id: kpId }) || [];
                    kpResourcesCache[kpId] = resources;
                }
                if (resources.length) {
                    const typeNames = { doc: '文档', mindmap: '思维导图', quiz: '测验', code: '代码', summary: '总结', animation: '动画' };
                    resourcesHtml = `<div class="step-expand-section"><div class="step-expand-label">已生成资源 (${resources.length})</div>${resources.map(r => `<span class="step-expand-link" onclick="event.stopPropagation();location.href='library.html?preview=${r.id}'">${typeNames[r.resource_type] || r.resource_type} (${r.created_at ? new Date(r.created_at).toLocaleDateString('zh-CN') : ''})</span>`).join('')}</div>`;
                } else {
                    resourcesHtml = `<div class="step-expand-section"><div class="step-expand-label">已生成资源</div><span style="font-size:12px;color:var(--text-3);">暂无资源</span></div>`;
                }
            } catch (e) { resourcesHtml = ''; }

            // 关联关系（从知识图谱缓存中查找）
            let relationsHtml = '';
            if (fullGraph && fullGraph.edges && kpId) {
                const relEdges = fullGraph.edges.filter(e => e.source_id === kpId || e.target_id === kpId);
                if (relEdges.length) {
                    const relParts = relEdges.map(e => {
                        const isSource = e.source_id === kpId;
                        const otherId = isSource ? e.target_id : e.source_id;
                        const otherNode = (fullGraph.nodes || []).find(n => n.id === otherId);
                        const dir = isSource ? '\u2192' : '\u2190';
                        return `${dir} ${e.relation || '关联'} ${otherNode ? otherNode.name : otherId}`;
                    });
                    relationsHtml = `<div class="step-expand-section"><div class="step-expand-label">关联关系 (${relEdges.length})</div><span style="font-size:12px;">${relParts.join(' &middot; ')}</span></div>`;
                }
            }

            expandDiv.innerHTML = `
                ${relationsHtml}
                ${resourcesHtml}
                <div class="step-expand-section">
                    <span class="step-expand-link" onclick="event.stopPropagation();location.href='generate.html?kp=${encodeURIComponent(kpId)}&kp_name=${encodeURIComponent(rowEl.querySelector('.step-name').textContent)}'">生成学习资源</span>
                    <span class="step-expand-link" onclick="event.stopPropagation();switchTab(document.querySelectorAll('.tab-btn')[0], 'kg');setTimeout(()=>{const n=fullGraph&&fullGraph.nodes.find(n=>n.id==='${kpId}');if(n)showDetailPanel(n);},300)">在知识图谱中查看</span>
                </div>
            `;
        }

        // === 拖拽排序 ===
        let dragFromIndex = -1;
        let dragItemId = null;

        function handleDragStart(e) {
            dragFromIndex = parseInt(e.currentTarget.dataset.index);
            dragItemId = e.currentTarget.dataset.itemId;
            e.currentTarget.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', dragItemId);
        }

        function handleDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            const row = e.currentTarget;
            if (!row.classList.contains('dragging')) {
                row.classList.add('drag-over');
            }
        }

        function handleDragLeave(e) {
            e.currentTarget.classList.remove('drag-over');
        }

        function handleDrop(e) {
            e.preventDefault();
            e.currentTarget.classList.remove('drag-over');
            const targetIndex = parseInt(e.currentTarget.dataset.index);
            const targetItemId = e.currentTarget.dataset.itemId;
            if (dragFromIndex === targetIndex || !activePathData) return;
            reorderItems(dragFromIndex, targetIndex);
        }

        function handleDragEnd(e) {
            e.currentTarget.classList.remove('dragging');
            document.querySelectorAll('.step-row.drag-over').forEach(r => r.classList.remove('drag-over'));
            dragFromIndex = -1;
            dragItemId = null;
        }

        async function reorderItems(fromIdx, toIdx) {
            if (!activePathData) return;
            const items = [...(activePathData.items || [])];
            const [moved] = items.splice(fromIdx, 1);
            items.splice(toIdx, 0, moved);
            activePathData.items = items;
            // 更新 order_index
            items.forEach((item, i) => { item.order_index = i; });
            renderRoadmap();
            // 持久化到后端
            try {
                const pathId = activePathId;
                for (const item of items) {
                    await markPathwayItemDone(pathId, item.id, userId, item.is_completed);
                }
                // 同步缓存
                const idx = pathways.findIndex(p => p.id === activePathId);
                if (idx >= 0) pathways[idx].items = items;
                populatePathwayOverlay();
            } catch (e) {
                showToast('排序保存失败: ' + (e.message || e), 'error');
                await loadPathwaysData();
                renderRoadmap();
            }
        }

        // === 移除单个知识点 ===
        async function handleRemoveItem(pathId, itemId, kpName) {
            const ok = await showDialog({ type: 'danger', title: '移除知识点', desc: `确定要从路径中移除「${kpName}」吗？`, confirmText: '确认移除' });
            if (!ok) return;
            try {
                await fetch(`/pathways/${pathId}/items/${itemId}?user_id=${encodeURIComponent(userId)}`, { method: 'DELETE' });
                showToast(`已移除「${kpName}」`, 'success');
                await loadPathwaysData();
                renderRoadmap();
                renderPathwayTabs();
                populatePathwayOverlay();
            } catch (e) { showToast('移除失败: ' + (e.message || e), 'error'); }
        }

        // === 创建路径对话框 ===
        function openPathwayDialog() {
            document.getElementById('pathway-dialog-overlay').classList.add('open');
            document.getElementById('pathway-dialog-name').value = '';
            setTimeout(() => document.getElementById('pathway-dialog-name').focus(), 100);
        }

        function closePathwayDialog() {
            document.getElementById('pathway-dialog-overlay').classList.remove('open');
        }

        async function handleCreatePathwayFromDialog() {
            const name = document.getElementById('pathway-dialog-name').value.trim();
            if (!name) return;
            try {
                await createPathway(userId, name);
                closePathwayDialog();
                await loadPathwaysData();
                // 切换到新创建的路径
                const lastPath = pathways[pathways.length - 1];
                if (lastPath) selectPathway(lastPath.id);
                showToast('路径创建成功', 'success');
            } catch (e) { showToast('创建失败: ' + (e.message || e), 'error'); }
        }

        // === 标记完成/取消 ===
        async function handleToggleItem(pathId, itemId, isCompleted) {
            try {
                await markPathwayItemDone(pathId, itemId, userId);
                // 更新本地数据
                if (activePathData && activePathData.items) {
                    const item = activePathData.items.find(i => i.id === itemId);
                    if (item) item.is_completed = isCompleted;
                }
                const pi = pathways.findIndex(p => p.id === pathId);
                if (pi >= 0) {
                    const item = pathways[pi].items.find(i => i.id === itemId);
                    if (item) item.is_completed = isCompleted;
                }
                renderRoadmap();
                populatePathwayOverlay();
            } catch (e) { showToast('操作失败: ' + (e.message || e), 'error'); }
        }

        // === 删除路径 ===
        async function handleDeletePathway(id) {
            const ok = await showDialog({ type: 'danger', title: '确定删除该路径？', desc: '删除后无法恢复', confirmText: '确认删除' });
            if (!ok) return;
            try {
                await deletePathway(id, userId);
                showToast('路径已删除', 'success');
                await loadPathwaysData();
                if (pathways.length) {
                    activePathId = pathways[0].id;
                    activePathData = pathways[0];
                } else {
                    activePathId = null;
                    activePathData = null;
                }
                renderPathwayTabs();
                renderRoadmap();
                populatePathwayOverlay();
            } catch (e) { showToast('删除失败: ' + (e.message || e), 'error'); }
        }

        // === 数据加载 ===
        function _normalizePathwayIds(list) {
            list.forEach(p => {
                p.id = String(p.id);
                if (p.items) {
                    p.items.forEach(item => { item.id = String(item.id); });
                }
            });
        }

        async function loadPathwaysData() {
            try {
                pathways = await getPathways(userId) || [];
            } catch (e) {
                pathways = [];
            }
            // Normalize Snowflake BigInt IDs to strings (API returns number,
            // HTML onclick passes as string, === strict comparison needs both string)
            _normalizePathwayIds(pathways);
            // 如果当前选中的路径已被删除，切换到第一个
            if (activePathId && !pathways.find(p => p.id === activePathId)) {
                activePathId = pathways.length ? pathways[0].id : null;
                activePathData = pathways.length ? pathways[0] : null;
            } else if (activePathId && activePathId === (activePathData && activePathData.id)) {
                // 刷新当前路径数据
                const fresh = pathways.find(p => p.id === activePathId);
                if (fresh) activePathData = fresh;
            }
        }

        // === 入口：加载并渲染 ===
        async function loadPathways() {
            await loadPathwaysData();
            populatePathwayOverlay();
            if (!activePathId && pathways.length) {
                activePathId = pathways[0].id;
                activePathData = pathways[0];
            }
            renderPathwayTabs();
            renderRoadmap();
        }

        // 兼容旧调用
        function showCreatePathway() { openPathwayDialog(); }
        async function handleCreatePathway() { await handleCreatePathwayFromDialog(); }

        // === HTML 转义 ===
        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
        }

        // === 路径叠加下拉框 ===
        function populatePathwayOverlay() {
            const sel = document.getElementById('kg-pathway-overlay');
            sel.innerHTML = '<option value="">路径叠加：无</option>' + pathways.map(p => `<option value="${p.id}">${escapeHtml(p.name || '未命名')}</option>`).join('');
        }

        // === Event bindings ===
        document.getElementById('kg-doc-select').addEventListener('change', loadKgGraph);
        document.getElementById('kg-root-select').addEventListener('change', loadKgGraph);
        document.getElementById('kg-depth').addEventListener('change', loadKgGraph);
        document.getElementById('kg-pathway-overlay').addEventListener('change', () => { if (fullGraph) applyFilters(); });
        document.getElementById('kg-learned-toggle').addEventListener('change', async () => {
            if (document.getElementById('kg-learned-toggle').checked) await loadLearnedState();
            if (fullGraph) applyFilters();
        });
        document.getElementById('kg-search-btn').addEventListener('click', () => { performSearch(); });
        document.getElementById('kg-search').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') performSearch();
        });
        document.getElementById('kg-bg-toggle').addEventListener('change', () => {
            const area = document.querySelector('.kg-graph-area');
            const isLight = document.getElementById('kg-bg-toggle').checked;
            area.classList.toggle('light-bg', isLight);
            // Update label colors for readability on light background
            if (chartInstance && fullGraph) applyFilters();
        });

        // === Init ===
        loadDocumentOptions();
        loadKgGraph();
        loadPathways(); // pre-cache for overlay

        // 支持 URL 参数自动切换 tab：?tab=pathways
        const _urlParams = new URLSearchParams(window.location.search);
        const _initTab = _urlParams.get('tab');
        if (_initTab === 'pathways') {
            const btn = document.querySelectorAll('.tab-btn')[1];
            if (btn) switchTab(btn, 'pathways');
        } else if (_initTab === 'study-plan') {
            const btn = document.querySelectorAll('.tab-btn')[2];
            if (btn) switchTab(btn, 'study-plan');
        }

        // ============================================================
        // === 学习计划 ===
        // ============================================================

        let studyPlans = [];

        async function loadStudyPlans() {
            try {
                studyPlans = await listStudyPlans(userId) || [];
            } catch (e) {
                studyPlans = [];
            }
            _normalizeStudyPlanIds(studyPlans);
            renderStudyPlanList();
        }

        function _normalizeStudyPlanIds(plans) {
            plans.forEach(p => {
                p.id = String(p.id);
                if (p.items) p.items.forEach(it => { it.id = String(it.id); });
            });
        }

        function renderStudyPlanList() {
            const empty = document.getElementById('sp-empty');
            const list = document.getElementById('sp-list');

            if (!studyPlans.length) {
                empty.style.display = 'block';
                list.style.display = 'none';
                return;
            }
            empty.style.display = 'none';
            list.style.display = 'block';

            const weekdays = ['日', '一', '二', '三', '四', '五', '六'];

            let html = '';
            studyPlans.forEach(plan => {
                const items = plan.items || [];
                const completed = items.filter(i => i.is_completed).length;
                const total = items.length;
                const pct = total ? Math.round(completed / total * 100) : 0;

                html += `<div class="sp-plan-card" id="sp-card-${plan.id}">`;
                // Header
                html += `<div class="sp-plan-header" onclick="window._toggleSpCollapse('${plan.id}')">`;
                html += `<div class="sp-plan-header-left">`;
                html += `<div class="sp-plan-title">${escapeHtml(plan.title || '学习计划')}</div>`;
                html += `<div class="sp-plan-meta">${plan.start_date || ''} ~ ${plan.end_date || ''} · 每日 ${plan.daily_time_minutes || '-'} 分钟 · ${completed}/${total} 项完成</div>`;
                html += `</div>`;
                const statusClass = plan.status || 'active';
                const statusLabel = { active: '进行中', archived: '已归档', completed: '已完成' }[statusClass] || statusClass;
                html += `<span class="sp-plan-status ${statusClass}">${statusLabel}</span>`;
                html += `<button class="btn btn-secondary btn-sm sp-plan-header-btn" onclick="event.stopPropagation();window._handleSpSendEmail('${plan.id}')"><i data-lucide="mail" style="width:13px;height:13px;"></i> 发送到邮箱</button>`;
                html += `<button class="btn-delete btn-sm sp-plan-header-btn" onclick="event.stopPropagation();window._handleSpDelete('${plan.id}')"><i data-lucide="trash-2" style="width:13px;height:13px;"></i> 删除计划</button>`;
                html += `<i data-lucide="chevron-down" class="sp-plan-arrow"></i>`;
                html += `</div>`;

                // Body
                html += `<div class="sp-plan-body">`;
                html += `<div class="sp-plan-progress"><span>完成进度 ${pct}%</span><div class="sp-progress-bar"><div class="sp-progress-fill" style="width:${pct}%"></div></div></div>`;

                // Group items by date
                const itemsByDate = new Map();
                items.forEach(it => {
                    const d = it.scheduled_date || '未排期';
                    if (!itemsByDate.has(d)) itemsByDate.set(d, []);
                    itemsByDate.get(d).push(it);
                });

                itemsByDate.forEach((dayItems, dateStr) => {
                    const d = new Date(dateStr + 'T00:00:00');
                    let label;
                    if (dateStr === '未排期') {
                        label = '未排期';
                    } else {
                        const m = d.getMonth() + 1;
                        const day = d.getDate();
                        const wd = weekdays[d.getDay()];
                        label = `${m}月${day}日 周${wd}`;
                    }
                    html += `<div class="sp-day-group"><div class="sp-day-label" onclick="event.stopPropagation();this.parentElement.classList.toggle('collapsed')"><i data-lucide="chevron-down" class="sp-day-label-arrow"></i>${label}</div><div class="sp-day-items">`;

                    dayItems.forEach(it => {
                        const isDone = it.is_completed;
                        html += `<div class="sp-item-row">`;
                        html += `<div class="sp-item-check${isDone ? ' done' : ''}" onclick="event.stopPropagation();window._handleSpItemToggle('${plan.id}', '${it.id}', ${!isDone})">`;
                        if (isDone) html += `<i data-lucide="check" style="width:14px;height:14px;"></i>`;
                        html += `</div>`;
                        html += `<div class="sp-item-info">`;
                        html += `<div class="sp-item-name${isDone ? ' done' : ''}" onclick="location.href='chat.html?kp=${encodeURIComponent(it.kp_id || '')}'">${escapeHtml(it.kp_name)}</div>`;
                        html += `<div class="sp-item-meta">`;
                        if (it.start_time) html += `<span class="sp-item-time">${it.start_time} - ${it.end_time || ''}</span>`;
                        html += `<span class="sp-item-minutes">${it.estimated_minutes || '-'} 分钟</span>`;
                        if (it.notes) html += `<span style="color:var(--text-3);">${escapeHtml(it.notes)}</span>`;
                        html += `</div></div>`;
                        html += `<div class="sp-item-resources">`;
                        if (it.resources && it.resources.length) {
                            it.resources.slice(0, 3).forEach(r => {
                                const typeNames = { doc: '文档', mindmap: '导图', quiz: '测验', code: '代码', summary: '总结', animation: '动画' };
                                const typeLabel = typeNames[r.resource_type] || r.resource_type;
                                html += `<span class="sp-res-tag" onclick="event.stopPropagation();location.href='library.html?preview=${r.resource_id}'">${typeLabel}</span>`;
                            });
                            if (it.resources.length > 3) html += `<span style="font-size:11px;color:var(--text-3);">+${it.resources.length - 3}</span>`;
                        }
                        if (it.missing_resource_types && it.missing_resource_types.length) {
                            it.missing_resource_types.forEach(t => {
                                html += `<span class="sp-res-missing" onclick="event.stopPropagation();window._handleSpGenMissing('${plan.id}', '${it.id}', '${t}')" title="点击生成${t}资源">缺${t}</span>`;
                            });
                        }
                        html += `</div>`;
                        if (it.missing_resource_types && it.missing_resource_types.length) {
                            html += `<button class="btn btn-secondary btn-sm" style="font-size:11px;padding:2px 8px;white-space:nowrap;" onclick="event.stopPropagation();window._handleSpGenMissing('${plan.id}', '${it.id}')">生成资源</button>`;
                        }
                        html += `</div>`;
                    });

                    html += `</div></div>`;
                });

                html += `</div></div>`;
            });

            list.innerHTML = html;
            lucide.createIcons();
        }

        function _toggleSpCollapse(planId) {
            const card = document.getElementById('sp-card-' + planId);
            if (card) card.classList.toggle('collapsed');
        }

        function _showSpGenerateDialog() {
            document.getElementById('sp-dialog-overlay').classList.add('open');
            const today = new Date().toISOString().slice(0, 10);
            document.getElementById('sp-dialog-start').value = today;
            document.getElementById('sp-dialog-title').value = '';
            document.getElementById('sp-dialog-days').value = '';
            document.getElementById('sp-dialog-daily').value = '';
        }

        function _closeSpGenerateDialog() {
            document.getElementById('sp-dialog-overlay').classList.remove('open');
        }

        async function _handleSpGenerate() {
            const btn = document.getElementById('sp-dialog-generate-btn');
            btn.disabled = true;
            btn.textContent = '生成中...';
            try {
                const data = {};
                const title = document.getElementById('sp-dialog-title').value.trim();
                if (title) data.title = title;
                const start = document.getElementById('sp-dialog-start').value;
                if (start) data.start_date = start;
                const days = parseInt(document.getElementById('sp-dialog-days').value);
                if (days) data.days = days;
                const daily = parseInt(document.getElementById('sp-dialog-daily').value);
                if (daily) data.daily_time_minutes = daily;

                const plan = await generateStudyPlan(userId, data);
                if (plan) {
                    showToast('学习计划已生成', 'success');
                    _closeSpGenerateDialog();
                    await loadStudyPlans();
                } else {
                    showToast('生成失败：没有可用的候选知识点，请先建立学习路径或完善画像', 'error');
                }
            } catch (e) {
                showToast('生成失败: ' + (e.message || e), 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '开始生成';
            }
        }

        async function _handleSpItemToggle(planId, itemId, isCompleted) {
            try {
                await updateStudyPlanItem(planId, itemId, userId, { is_completed: isCompleted });
                const plan = studyPlans.find(p => p.id === planId);
                if (plan) {
                    const item = (plan.items || []).find(i => i.id === itemId);
                    if (item) item.is_completed = isCompleted;
                    renderStudyPlanList();
                }
            } catch (e) {
                showToast('操作失败: ' + (e.message || e), 'error');
            }
        }

        async function _handleSpGenMissing(planId, itemId, singleType) {
            const plan = studyPlans.find(p => p.id === planId);
            if (!plan) return;
            const item = (plan.items || []).find(i => i.id === itemId);
            if (!item) return;
            const types = singleType ? [singleType] : (item.missing_resource_types || []);
            if (!types.length) return;

            try {
                const result = await generateStudyPlanItemResources(planId, itemId, userId, types);
                if (result) {
                    showToast(result.message || '已触发资源生成', 'success');
                    setTimeout(async () => {
                        await loadStudyPlans();
                    }, 3000);
                }
            } catch (e) {
                showToast('资源生成失败: ' + (e.message || e), 'error');
            }
        }

        async function _handleSpSendEmail(planId) {
            const plan = studyPlans.find(p => p.id === planId);
            if (!plan) { showToast('计划不存在', 'error'); return; }

            const items = plan.items || [];
            const total = items.length;
            const completed = items.filter(i => i.is_completed).length;
            const dateSet = new Set();
            items.forEach(it => { if (it.scheduled_date && it.scheduled_date !== '未排期') dateSet.add(it.scheduled_date); });
            const dayCount = dateSet.size || Math.ceil(total / 2) || '?';

            const desc = [
                `计划：${plan.title || '学习计划'}`,
                `周期：${plan.start_date || '?'} ~ ${plan.end_date || '?'}`,
                `内容：${dayCount} 天，${total} 项任务（${completed} 项已完成）`,
                ``,
                `邮件将发送至您的注册邮箱，包含完整的每日学习安排。`,
            ].join('\n');

            const ok = await showDialog({ type: 'normal', title: '发送学习计划到邮箱？', desc, confirmText: '确认发送', cancelText: '取消' });
            if (!ok) return;

            try {
                const { sendStudyPlanEmail } = await import('./assets/api.js');
                const result = await sendStudyPlanEmail(planId, userId);
                if (result) showToast(result.message || '邮件已发送', 'success');
            } catch (e) {
                showToast('发送失败: ' + (e.message || e), 'error');
            }
        }

        async function _handleSpDelete(planId) {
            const ok = await showDialog({ type: 'danger', title: '确定删除该学习计划？', desc: '删除后无法恢复', confirmText: '确认删除' });
            if (!ok) return;
            try {
                await deleteStudyPlan(planId, userId);
                showToast('计划已删除', 'success');
                await loadStudyPlans();
            } catch (e) {
                showToast('删除失败: ' + (e.message || e), 'error');
            }
        }

        // === Expose to global (required: type="module" isolates scope, onclick needs window.*) ===
        window.switchTab = switchTab;
        window.loadKgGraph = loadKgGraph;
        window.selectPathway = selectPathway;
        window.toggleMorePathways = toggleMorePathways;
        window.openPathwayDialog = openPathwayDialog;
        window.closePathwayDialog = closePathwayDialog;
        window.handleCreatePathwayFromDialog = handleCreatePathwayFromDialog;
        window.handleRemoveItem = handleRemoveItem;
        window.scrollToStep = scrollToStep;
        window.toggleStepExpand = toggleStepExpand;
        window.handleDragStart = handleDragStart;
        window.handleDragOver = handleDragOver;
        window.handleDragLeave = handleDragLeave;
        window.handleDrop = handleDrop;
        window.handleDragEnd = handleDragEnd;
        window.showCreatePathway = showCreatePathway;
        window.handleCreatePathway = handleCreatePathway;
        window.handleDeletePathway = handleDeletePathway;
        window.handleToggleItem = handleToggleItem;
        window._toggleSpCollapse = _toggleSpCollapse;
        window._showSpGenerateDialog = _showSpGenerateDialog;
        window._closeSpGenerateDialog = _closeSpGenerateDialog;
        window._handleSpGenerate = _handleSpGenerate;
        window._handleSpItemToggle = _handleSpItemToggle;
        window._handleSpGenMissing = _handleSpGenMissing;
        window._handleSpSendEmail = _handleSpSendEmail;
        window._handleSpDelete = _handleSpDelete;
        }

        function destroy() {
            if (chartInstance) { chartInstance.dispose(); chartInstance = null; }
            if (resizeHandler) { window.removeEventListener('resize', resizeHandler); resizeHandler = null; }
        }

        registerPage('pathway', init, destroy);
        init();
    </script>
    <script>lucide.createIcons();</script>
    <script src="./assets/tracker.js"></script>
    <script type="module" src="./assets/assistant.js"></script>

</body>
</html>
