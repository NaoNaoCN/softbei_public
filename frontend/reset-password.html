<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重置密码 - 个性化学习助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #F7F8FC;
            color: #1E1E2E;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            width: 420px;
            background: #fff;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo h1 { font-size: 24px; color: #4F6EF7; font-weight: 700; }
        .logo p { font-size: 14px; color: #4B5563; margin-top: 8px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 14px; color: #374151; margin-bottom: 6px; font-weight: 500; }
        .form-group input {
            width: 100%; padding: 12px 16px; border: 2px solid #E5E7EB; border-radius: 8px;
            font-size: 15px; color: #1E1E2E; outline: none; transition: border-color 0.2s;
        }
        .form-group input:focus { border-color: #4F6EF7; }
        .btn {
            width: 100%; padding: 14px; background: #4F6EF7; color: #fff; border: none;
            border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.2s;
        }
        .btn:hover { background: #3B5DE7; }
        .btn:disabled { background: #9CA3AF; cursor: not-allowed; }
        .message { margin-top: 16px; padding: 12px; border-radius: 8px; font-size: 14px; text-align: center; display: none; }
        .message.success { background: #D1FAE5; color: #065F46; display: block; }
        .message.error { background: #FEE2E2; color: #991B1B; display: block; }
        .back-link { text-align: center; margin-top: 20px; }
        .back-link a { font-size: 14px; color: #4F6EF7; text-decoration: none; }
        .back-link a:hover { text-decoration: underline; }
        .error-state { text-align: center; padding: 20px; display: none; }
        .error-state h2 { font-size: 18px; color: #991B1B; margin-bottom: 12px; }
        .error-state p { font-size: 14px; color: #4B5563; }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">
        <h1>重置密码</h1>
        <p>请设置新密码</p>
    </div>
    <div id="errorState" class="error-state">
        <h2>链接无效</h2>
        <p id="errorMsg">重置链接已过期或无效，请重新申请。</p>
        <div class="back-link"><a href="/app/forgot-password.html">重新申请</a></div>
    </div>
    <form id="resetForm">
        <div class="form-group">
            <label for="password">新密码</label>
            <input type="password" id="password" placeholder="至少6位字符" minlength="6" required>
        </div>
        <div class="form-group">
            <label for="confirm">确认密码</label>
            <input type="password" id="confirm" placeholder="再次输入新密码" minlength="6" required>
        </div>
        <button type="submit" class="btn" id="submitBtn">重置密码</button>
    </form>
    <div id="message" class="message"></div>
    <div class="back-link">
        <a href="/app/auth.html">返回登录</a>
    </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const token = params.get('token');

if (!token) {
    document.getElementById('errorState').style.display = 'block';
    document.getElementById('resetForm').style.display = 'none';
    document.getElementById('errorMsg').textContent = '缺少重置 token，请从邮件链接访问此页面。';
}

document.getElementById('resetForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm').value;
    const btn = document.getElementById('submitBtn');
    const msg = document.getElementById('message');

    if (password !== confirm) {
        msg.className = 'message error';
        msg.textContent = '两次输入的密码不一致';
        return;
    }
    if (password.length < 6) {
        msg.className = 'message error';
        msg.textContent = '密码至少6位字符';
        return;
    }

    btn.disabled = true;
    btn.textContent = '重置中...';
    msg.className = 'message';

    try {
        const res = await fetch('/auth/reset-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token, new_password: password }),
        });
        const data = await res.json();
        if (res.ok) {
            msg.className = 'message success';
            msg.textContent = data.message + '，即将跳转到登录页...';
            setTimeout(() => { window.location.href = '/app/auth.html'; }, 2000);
        } else {
            msg.className = 'message error';
            msg.textContent = data.detail || '重置失败，请重新申请';
        }
    } catch (err) {
        msg.className = 'message error';
        msg.textContent = '网络错误，请稍后再试';
    } finally {
        btn.disabled = false;
        btn.textContent = '重置密码';
    }
});
</script>
</body>
</html>
