<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学习报告</title>
</head>
<body style="margin:0;padding:0;background-color:#f5f7fa;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f5f7fa;padding:40px 0;">
  <tr>
    <td align="center">
      <table width="600" cellpadding="0" cellspacing="0" style="background-color:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.08);">
        <!-- Header -->
        <tr>
          <td style="background:linear-gradient(135deg,#10b981,#059669);padding:32px 40px;text-align:center;">
            <h1 style="color:#ffffff;font-size:24px;margin:0;font-weight:600;">学习报告</h1>
            <p style="color:rgba(255,255,255,0.85);font-size:14px;margin:8px 0 0;">{{ date }}</p>
          </td>
        </tr>
        <!-- Body -->
        <tr>
          <td style="padding:40px;">
            <p style="font-size:16px;color:#1f2937;line-height:1.6;margin:0 0 24px;">
              您好 <strong>{{ username }}</strong>，以下是您的学习报告：
            </p>

            <!-- Stats Table -->
            <table width="100%" cellpadding="0" cellspacing="0" style="border-collapse:collapse;margin-bottom:24px;">
              <tr style="background-color:#f9fafb;">
                <td style="padding:12px 16px;border:1px solid #e5e7eb;font-size:14px;color:#374151;font-weight:600;">指标</td>
                <td style="padding:12px 16px;border:1px solid #e5e7eb;font-size:14px;color:#374151;font-weight:600;">数据</td>
              </tr>
              <tr>
                <td style="padding:12px 16px;border:1px solid #e5e7eb;font-size:14px;color:#374151;">学习资源数</td>
                <td style="padding:12px 16px;border:1px solid #e5e7eb;font-size:14px;color:#4f46e5;font-weight:600;">{{ resource_count }}</td>
              </tr>
              <tr style="background-color:#f9fafb;">
                <td style="padding:12px 16px;border:1px solid #e5e7eb;font-size:14px;color:#374151;">完成测验数</td>
                <td style="padding:12px 16px;border:1px solid #e5e7eb;font-size:14px;color:#4f46e5;font-weight:600;">{{ quiz_count }}</td>
              </tr>
              <tr>
                <td style="padding:12px 16px;border:1px solid #e5e7eb;font-size:14px;color:#374151;">平均掌握度</td>
                <td style="padding:12px 16px;border:1px solid #e5e7eb;font-size:14px;color:#4f46e5;font-weight:600;">{{ mastery }}%</td>
              </tr>
              <tr style="background-color:#f9fafb;">
                <td style="padding:12px 16px;border:1px solid #e5e7eb;font-size:14px;color:#374151;">学习路径数</td>
                <td style="padding:12px 16px;border:1px solid #e5e7eb;font-size:14px;color:#4f46e5;font-weight:600;">{{ pathway_count }}</td>
              </tr>
            </table>

            <!-- CTA -->
            <table cellpadding="0" cellspacing="0" style="margin:0 auto;">
              <tr>
                <td align="center" style="background-color:#10b981;border-radius:8px;padding:14px 36px;">
                  <a href="http://localhost:8000/app/evaluate.html" target="_blank" style="color:#ffffff;font-size:16px;font-weight:600;text-decoration:none;display:inline-block;">查看完整报告</a>
                </td>
              </tr>
            </table>
          </td>
        </tr>
        <!-- Footer -->
        <tr>
          <td style="background-color:#f9fafb;padding:20px 40px;text-align:center;border-top:1px solid #e5e7eb;">
            <p style="font-size:12px;color:#9ca3af;margin:0;">
              个性化资源生成与学习多智能体系统
            </p>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
</body>
</html>
