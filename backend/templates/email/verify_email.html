<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>验证邮箱</title>
</head>
<body style="margin:0;padding:0;background-color:#f5f7fa;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f5f7fa;padding:40px 0;">
  <tr>
    <td align="center">
      <table width="600" cellpadding="0" cellspacing="0" style="background-color:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.08);">
        <!-- Header -->
        <tr>
          <td style="background:linear-gradient(135deg,#4f46e5,#7c3aed);padding:32px 40px;text-align:center;">
            <h1 style="color:#ffffff;font-size:24px;margin:0;font-weight:600;">学习系统</h1>
          </td>
        </tr>
        <!-- Body -->
        <tr>
          <td style="padding:40px;">
            <p style="font-size:16px;color:#1f2937;line-height:1.6;margin:0 0 16px;">
              您好 <strong>{{ username }}</strong>，
            </p>
            <p style="font-size:16px;color:#1f2937;line-height:1.6;margin:0 0 24px;">
              感谢注册学习系统！请点击下方按钮验证您的邮箱地址：
            </p>
            <!-- Button -->
            <table cellpadding="0" cellspacing="0" style="margin:0 auto;">
              <tr>
                <td align="center" style="background-color:#4f46e5;border-radius:8px;padding:14px 36px;">
                  <a href="{{ verify_url }}" target="_blank" style="color:#ffffff;font-size:16px;font-weight:600;text-decoration:none;display:inline-block;">验证邮箱</a>
                </td>
              </tr>
            </table>
            <p style="font-size:14px;color:#6b7280;line-height:1.6;margin:24px 0 0;">
              此链接将在 30 分钟内有效。如果您未注册此账号，请忽略此邮件。
            </p>
            <p style="font-size:13px;color:#9ca3af;line-height:1.6;margin:16px 0 0;">
              如果按钮无法点击，请复制以下链接到浏览器打开：<br>
              <a href="{{ verify_url }}" style="color:#4f46e5;word-break:break-all;">{{ verify_url }}</a>
            </p>
          </td>
        </tr>
        <!-- Footer -->
        <tr>
          <td style="background-color:#f9fafb;padding:20px 40px;text-align:center;border-top:1px solid #e5e7eb;">
            <p style="font-size:12px;color:#9ca3af;margin:0;">
              个性化资源生成与学习多智能体系统
            </p>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
</body>
</html>
